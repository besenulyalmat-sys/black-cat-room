<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Hi Pupils</title>

<style>

body{
margin:0;

height:100vh;

background:linear-gradient(
135deg,
#ffffff,
#f3e8ff,
#ffe4f0,
#e6fff5
);

display:flex;
justify-content:center;
align-items:center;
}

.container{

background:white;
padding:60px;
border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,0.1);

text-align:center;

width:420px;

}

h1{

margin-bottom:40px;

color:#7c3aed;

font-size:36px;

}

button{

margin:15px;
padding:15px 40px;

font-size:18px;
font-weight:bold;

border:none;
border-radius:12px;

cursor:pointer;

transition:0.3s;

}

.teacher{

background:#7c3aed;
color:white;

}

.teacher:hover{

background:#6d28d9;

}

.student{

background:#10b981;
color:white;

}

.student:hover{

}

.footer{

font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<h1>🌸 Hi Pupils</h1>

</a>

<div class="footer">
Class interaction system
</div>

</div>

</html>
