<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Hi Pupils — Student</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header>🌸 Hi Pupils — Student</header>

<input id="room" placeholder="Room">

<input id="name" placeholder="Name">

<button onclick="join()">Join</button>

<h3>Task</h3>

<div id="task">Waiting...</div>

<textarea id="answer" placeholder="Write answer"></textarea>

<button onclick="send()">Submit</button>

<div class="card">

<h3>Teacher Comment</h3>

<div id="comment"></div>

</div>

<div class="leaderboard">

<h3>Leaderboard</h3>

<div id="board"></div>

</div>

</div>

<div class="gif-popup" id="gifBox">

<img id="gifImg">

</div>

<script type="module">

import { initializeApp } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getDatabase,
ref,
onValue,
push
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBsrZ_k2K8u0ybvkEDoEywD_QWzmDTKjyY",
  authDomain: "black-cat-room.firebaseapp.com",
  databaseURL: "https://black-cat-room-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "black-cat-room",
  storageBucket: "black-cat-room.firebasestorage.app",
  messagingSenderId: "80028312826",
  appId: "1:80028312826:web:ee918db88c71a0c1335543",
  measurementId: "G-9W8RSBP8WQ"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let room="";
let name="";
let lastScore=0;

window.join=function(){

room=document.getElementById("room").value;
name=document.getElementById("name").value;

onValue(ref(db,"rooms/"+room+"/task"),snap=>{

document.getElementById("task").innerText=snap.val()||"Waiting";

});

onValue(ref(db,"rooms/"+room+"/comments/"+name),snap=>{

document.getElementById("comment").innerText=snap.val()||"";

});

onValue(ref(db,"rooms/"+room+"/scores/"+name),snap=>{

const score=snap.val()||0;

if(score>lastScore){

showGif(score);

}

lastScore=score;

});

onValue(ref(db,"rooms/"+room+"/scores"),snap=>{

const scores=snap.val();

if(!scores)return;

const sorted=Object.entries(scores)
.sort((a,b)=>b[1]-a[1])
.slice(0,10);

let html="";

sorted.forEach(([n,p])=>{

html+=n+" — "+p+"<br>";

});

document.getElementById("board").innerHTML=html;

});

onValue(ref(db,"rooms/"+room+"/shutup/"+name),snap=>{

if(snap.val()){

showShut()

}

});

}

window.send=function(){

const text=document.getElementById("answer").value;

push(ref(db,"rooms/"+room+"/answers/"+name),{

text:text,
time:Date.now()

});

document.getElementById("answer").value="";

}

function showGif(points){

const gif=document.getElementById("gifImg");
const box=document.getElementById("gifBox");

gif.src=points+"-ezgif.com-optimize.gif";

box.style.display="block";

setTimeout(()=>{

box.style.display="none";

},3000);

}

function showShut(){

const gif=document.getElementById("gifImg");
const box=document.getElementById("gifBox");

gif.src="SHUT.gif";

box.style.display="block";

setTimeout(()=>{

box.style.display="none";

},3000);

}

</script>

</body>
</html>
