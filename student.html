<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Black Cat Room — Student</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0a0a0a,#111,#1a1a1a);
color:#00ff9d;
}

.container{
width:95%;
margin:auto;
margin-top:20px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:20px;
}

.left-top{
display:flex;
align-items:center;
gap:15px;
}

input{
padding:10px;
background:#111;
border:1px solid #00ff9d;
color:#00ff9d;
border-radius:8px;
}

textarea{
width:100%;
height:340px;
resize:vertical;
padding:15px;
background:#0f0f0f;
color:#00ff9d;
border:1px solid #00ff9d;
border-radius:15px;
font-size:16px;
box-shadow:0 0 10px #00ff9d33 inset;
}

button{
padding:10px 20px;
background:#00ff9d;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#00cc7a;
}

.rank-box{
background:#111;
padding:15px;
border-radius:15px;
width:220px;
box-shadow:0 0 15px #00ff9d55;
}

#gifReward{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
z-index:9999;
}

#gifReward img{
width:420px;
border-radius:20px;
box-shadow:0 0 40px #00ff9d;
}

</style>
</head>

<body>

<div class="container">

<div class="top-bar">

<div class="left-top">

<div>

<input id="roomCode" placeholder="Room">
<input id="studentName" placeholder="Name">

<button onclick="joinRoom()">Join</button>

</div>

</div>

<div>

<div id="timerBox" style="font-size:18px;margin-bottom:10px;"></div>

<div id="teacherCommentBox" style="
padding:10px;
background:#111;
border:1px solid #00ff9d;
border-radius:10px;
margin-bottom:10px;
">

<b>💬 Комментарий учителя:</b>
<div id="teacherCommentText">Нет комментариев</div>

</div>

<div class="rank-box">

<div id="rankDisplay">Очки: 0</div>

<h4>🏆 Top 5</h4>

<div id="studentLeaderboard"></div>

</div>

</div>

</div>

<h2>Current Task:</h2>

<div id="task">Waiting...</div>

<textarea id="answerInput" placeholder="Write answer..."></textarea>

<button onclick="submitAnswer()">Submit</button>

</div>


<div id="gifReward">
<img id="rewardGif">
</div>



<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getDatabase,
ref,
onValue,
push
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyBsrZ_k2K8u0ybvkEDoEywD_QWzmDTKjyY",
authDomain: "black-cat-room.firebaseapp.com",
databaseURL: "https://black-cat-room-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "black-cat-room",
storageBucket: "black-cat-room.firebasestorage.app",
messagingSenderId: "80028312826",
appId: "1:80028312826:web:ee918db88c71a0c1335543"

};


const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentRoom="";
let currentName="";
let lastPoints=0;



window.joinRoom=function(){

const room=document.getElementById("roomCode").value;
const name=document.getElementById("studentName").value;

if(!room||!name) return alert("Fill fields");

currentRoom=room;
currentName=name;


onValue(ref(db,"rooms/"+room+"/task"),snap=>{

document.getElementById("task").innerText=
snap.val() || "Waiting...";

});


onValue(ref(db,"rooms/"+room+"/comments/"+name),snap=>{

document.getElementById("teacherCommentText").innerText=
snap.val() || "Нет комментариев";

});


onValue(ref(db,"rooms/"+room+"/timer/endTime"),snap=>{

const endTime=snap.val();
if(!endTime) return;

const interval=setInterval(()=>{

const diff=endTime-Date.now();

if(diff<=0){

clearInterval(interval);

document.getElementById("answerInput").disabled=true;

document.getElementById("timerBox").innerText="⛔ Время вышло";

}else{

document.getElementById("timerBox").innerText=
"⏳ Осталось: "+Math.floor(diff/1000)+" сек";

}

},1000);

});


onValue(ref(db,"rooms/"+room+"/scores/"+name),snap=>{

const points=snap.val()||0;

document.getElementById("rankDisplay").innerHTML=
`Очки: ${points}`;

if(points>lastPoints){

showReward(points);

}

lastPoints=points;

});


onValue(ref(db,"rooms/"+room+"/scores"),snap=>{

const scores=snap.val();
const board=document.getElementById("studentLeaderboard");

board.innerHTML="";

if(!scores) return;

const sorted=Object.entries(scores)
.sort((a,b)=>b[1]-a[1]);

sorted.slice(0,5).forEach(([name,pts],i)=>{

const medal=i==0?"🥇":i==1?"🥈":i==2?"🥉":"🐾";

board.innerHTML+=`${medal} ${name} — ${pts}<br>`;

});

});

};



window.submitAnswer=function(){

const text=document.getElementById("answerInput").value;

if(!text) return;

push(ref(db,"rooms/"+currentRoom+"/answers/"+currentName),{

text:text,
time:Date.now(),
checked:false,
scoreGiven:0

});

document.getElementById("answerInput").value="";

};



function showReward(points){

const gif=document.getElementById("rewardGif");
const box=document.getElementById("gifReward");

gif.src="gifs/points/"+points+".gif";

box.style.display="block";

setTimeout(()=>{

box.style.display="none";

},3000);

}

</script>

</body>
</html>
