<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Black Cat Room — Student 5.0</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<header>🎓 Student Panel</header>

<input id="roomCode" placeholder="Room">
<input id="studentName" placeholder="Name">

<button onclick="joinRoom()">Join</button>

<h3>Task</h3>

<div id="task">Waiting...</div>

<textarea id="answerInput" placeholder="Write answer"></textarea>

<input type="file" id="screenshot">

<button onclick="submitAnswer()">Submit</button>

<div class="card">

<h3>Teacher Comment</h3>

<div id="commentBox">None</div>

</div>

<div class="card">

<h3>Leaderboard</h3>

<div id="leaderboard"></div>

</div>

</div>

<div id="gifPopup" class="gif-popup">

<img id="gifReward">

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getDatabase,
ref,
onValue,
push
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {

apiKey:"AIzaSyBsrZ_k2K8u0ybvkEDoEywD_QWzmDTKjyY",
authDomain:"black-cat-room.firebaseapp.com",
databaseURL:"https://black-cat-room-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"black-cat-room",
storageBucket:"black-cat-room.firebasestorage.app",
messagingSenderId:"80028312826",
appId:"1:80028312826:web:ee918db88c71a0c1335543"

};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let room="";
let name="";
let lastScore=0;

window.joinRoom=function(){

room=document.getElementById("roomCode").value;
name=document.getElementById("studentName").value;

onValue(ref(db,"rooms/"+room+"/task"),snap=>{

document.getElementById("task").innerText=snap.val();

});

onValue(ref(db,"rooms/"+room+"/comments/"+name),snap=>{

document.getElementById("commentBox").innerText=snap.val();

});

onValue(ref(db,"rooms/"+room+"/scores/"+name),snap=>{

const score=snap.val()||0;

if(score>lastScore){

showGif(score);

}

lastScore=score;

});

onValue(ref(db,"rooms/"+room+"/scores"),snap=>{

const scores=snap.val();

const board=document.getElementById("leaderboard");

board.innerHTML="";

if(!scores)return;

Object.entries(scores)

.sort((a,b)=>b[1]-a[1])

.slice(0,5)

.forEach(([n,p])=>{

board.innerHTML+=n+" — "+p+"<br>";

});

});

}

window.submitAnswer=function(){

const text=document.getElementById("answerInput").value;

push(ref(db,"rooms/"+room+"/answers/"+name),{

text:text,
time:Date.now()

});

}

function showGif(points){

const gif=document.getElementById("gifReward");
const popup=document.getElementById("gifPopup");

gif.src="gifs/points/"+points+".gif";

popup.style.display="block";

setTimeout(()=>{

popup.style.display="none";

},3000);

}

</script>

</body>
</html>
