<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Hi Pupils — Student</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<header>🌸 Hi Pupils — Student</header>

<input id="room" placeholder="Room">
<input id="name" placeholder="Name">

<button onclick="join()">Join</button>

<div id="timerDisplay" class="timer"></div>

<h3>Task</h3>
<div id="task">Waiting...</div>

<textarea id="answer" placeholder="Write answer"></textarea>

<button onclick="send()">Submit</button>

<div class="card">
<h3>Teacher Comment</h3>
<div id="comment"></div>
</div>

<div class="leaderboard">
<h3>Leaderboard</h3>
<div id="board"></div>
</div>

<div class="card">

<h3>Lesson Feedback</h3>

<button onclick="feedback('good')">👍 I understand</button>

<button onclick="feedback('middle')">😐 Middle</button>

<button onclick="feedback('bad')">👎 I don't understand</button>

</div>

</div>

<div class="gif-popup" id="gifBox">
<img id="gifImg">
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getDatabase,
ref,
onValue,
push
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBsrZ_k2K8u0ybvkEDoEywD_QWzmDTKjyY",
authDomain:"black-cat-room.firebaseapp.com",
databaseURL:"https://black-cat-room-default-rtdb.europe-west1.firebasedatabase.app"
};

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

let room=""
let name=""
let lastScore=0

window.join=function(){

room=document.getElementById("room").value
name=document.getElementById("name").value

onValue(ref(db,"rooms/"+room+"/task"),snap=>{
document.getElementById("task").innerText=snap.val()||"Waiting"
})

onValue(ref(db,"rooms/"+room+"/comments/"+name),snap=>{
document.getElementById("comment").innerText=snap.val()||""
})

onValue(ref(db,"rooms/"+room+"/scores/"+name),snap=>{

const score=snap.val()||0

if(score>lastScore){

showGif(score)

}

lastScore=score

})

onValue(ref(db,"rooms/"+room+"/scores"),snap=>{

const scores=snap.val()

if(!scores)return

const sorted=Object.entries(scores)
.sort((a,b)=>b[1]-a[1])
.slice(0,10)

let html=""

sorted.forEach(([n,p])=>{
html+=n+" — "+p+"<br>"
})

document.getElementById("board").innerHTML=html

})

onValue(ref(db,"rooms/"+room+"/timer"),snap=>{

const end=snap.val()

if(!end) return

const interval=setInterval(()=>{

const diff=end-Date.now()

const sec=Math.floor(diff/1000)

if(diff<=0){

clearInterval(interval)

document.getElementById("timerDisplay").innerText="Time is over"

document.getElementById("answer").disabled=true

return

}

document.getElementById("timerDisplay").innerText=
"⏱ Time left: "+sec+"s"

},1000)

})

onValue(ref(db,"rooms/"+room+"/shutup/"+name),snap=>{
if(snap.val()) showShut()
})

onValue(ref(db,"rooms/"+room+"/gifcomment/"+name),snap=>{

const gif=snap.val()

if(gif){

const img=document.getElementById("gifImg")
const box=document.getElementById("gifBox")

img.src=gif

box.style.display="block"

setTimeout(()=>{
box.style.display="none"
},3000)

}

})

}

window.send=function(){

const text=document.getElementById("answer").value

if(!text) return

push(ref(db,"rooms/"+room+"/answers/"+name),{
text:text,
time:Date.now()
})

document.getElementById("answer").value=""

}

window.feedback=function(type){

set(ref(db,"rooms/"+room+"/feedback/"+name),type)

alert("Thanks!")

}

function showGif(points){

const gif=document.getElementById("gifImg")
const box=document.getElementById("gifBox")

gif.src=points+"-ezgif.com-optimize.gif"

box.style.display="block"

setTimeout(()=>box.style.display="none",3000)

}

function showShut(){

const gifs=["SHUT.gif","SHUT1.gif","SHUT2.gif"]

const random=Math.floor(Math.random()*gifs.length)

const gif=document.getElementById("gifImg")
const box=document.getElementById("gifBox")

gif.src=gifs[random]

box.style.display="block"

setTimeout(()=>box.style.display="none",3000)

}

</script>

</body>
</html>
