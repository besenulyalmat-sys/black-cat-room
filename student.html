<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Black Cat Room – Student PRO 4.0</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:#00ff9d;
}

.container{
width:95%;
margin:auto;
margin-top:20px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:flex-start;
gap:20px;
}

.left-top{
display:flex;
align-items:center;
gap:15px;
}

#catImage{
width:120px;
border-radius:20px;
transition:0.5s;
}

input{
padding:8px;
background:#111;
border:1px solid #00ff9d;
color:#00ff9d;
border-radius:6px;
}

textarea{
width:100%;
height:320px;
resize:vertical;
padding:15px;
background:#111;
color:#00ff9d;
border:1px solid #00ff9d;
border-radius:15px;
font-size:16px;
}

button{
padding:10px 20px;
background:#00ff9d;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.rank-box{
background:#111;
padding:15px;
border-radius:15px;
width:220px;
}

.level-up{
animation:glow 0.6s;
}

@keyframes glow{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

/* GIF reward */

#gifReward{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:none;
z-index:9999;
}

#gifReward img{
width:420px;
border-radius:20px;
box-shadow:0 0 40px #00ff9d;
}

</style>
</head>

<body>

<div class="container">

<div class="top-bar">

<div class="left-top">

<img id="catImage" src="cat-level1.jpg">

<div>

<input id="roomCode" placeholder="Room">
<input id="studentName" placeholder="Name">

<button onclick="joinRoom()">Join</button>

</div>

</div>

<div>

<div id="timerBox" style="font-size:18px;margin-bottom:10px;"></div>

<div id="teacherCommentBox" style="
padding:10px;
background:#111;
border:1px solid #00ff9d;
border-radius:10px;
margin-bottom:10px;
">

<b>💬 Комментарий учителя:</b>
<div id="teacherCommentText">Нет комментариев</div>

</div>

<div class="rank-box">

<div id="rankDisplay">Очки: 0</div>

<h4>🏆 Top 5</h4>

<div id="studentLeaderboard"></div>

</div>

</div>

</div>

<h2>Current Task:</h2>

<div id="task">Waiting...</div>

<textarea id="answerInput" placeholder="Write answer..."></textarea>

<button onclick="submitAnswer()">Submit</button>

</div>


<!-- GIF reward -->
<div id="gifReward">
<img id="rewardGif">
</div>



<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getDatabase,
ref,
onValue,
push
}

from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyBsrZ_k2K8u0ybvkEDoEywD_QWzmDTKjyY",
authDomain: "black-cat-room.firebaseapp.com",
databaseURL: "https://black-cat-room-default-rtdb.europe-west1.firebasedatabase.app",
projectId: "black-cat-room",
storageBucket: "black-cat-room.firebasestorage.app",
messagingSenderId: "80028312826",
appId: "1:80028312826:web:ee918db88c71a0c1335543"

};


const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let currentRoom="";
let currentName="";
let currentLevel=1;
let lastPoints=0;



// JOIN ROOM

window.joinRoom=function(){

const room=document.getElementById("roomCode").value;
const name=document.getElementById("studentName").value;

if(!room||!name) return alert("Fill fields");

currentRoom=room;
currentName=name;



// TASK

onValue(ref(db,"rooms/"+room+"/task"),snap=>{

document.getElementById("task").innerText=
snap.val() || "Waiting...";

});



// TEACHER COMMENT

onValue(ref(db,"rooms/"+room+"/comments/"+name),snap=>{

document.getElementById("teacherCommentText").innerText=
snap.val() || "Нет комментариев";

});



// TIMER

onValue(ref(db,"rooms/"+room+"/timer/endTime"),snap=>{

const endTime=snap.val();

if(!endTime) return;

const interval=setInterval(()=>{

const diff=endTime-Date.now();

if(diff<=0){

clearInterval(interval);

document.getElementById("answerInput").disabled=true;

document.getElementById("timerBox").innerText="⛔ Время вышло";

}else{

document.getElementById("timerBox").innerText=
"⏳ Осталось: "+Math.floor(diff/1000)+" сек";

}

},1000);

});




// SCORE

onValue(ref(db,"rooms/"+room+"/scores/"+name),snap=>{

const points=snap.val()||0;



// GIF reward when score increased

if(points>lastPoints){

showReward(points);

}

lastPoints=points;



let level=1;
let levelText="Новичок";

if(points>=3){level=2;levelText="Котёнок";}
if(points>=6){level=3;levelText="Охотник";}
if(points>=10){level=4;levelText="Чёрный Лорд";}

document.getElementById("rankDisplay").innerHTML=

`Очки: ${points}/10<br>Уровень: ${levelText}`;

const img=document.getElementById("catImage");

img.src="cat-level"+level+".jpg";

if(level>currentLevel){

img.classList.add("level-up");

setTimeout(()=>img.classList.remove("level-up"),600);

}

currentLevel=level;

});



// LEADERBOARD

onValue(ref(db,"rooms/"+room+"/scores"),snap=>{

const scores=snap.val();

const board=document.getElementById("studentLeaderboard");

board.innerHTML="";

if(!scores) return;

const sorted=Object.entries(scores)

.sort((a,b)=>b[1]-a[1]);

sorted.slice(0,5).forEach(([name,pts],i)=>{

const medal=i==0?"🥇":i==1?"🥈":i==2?"🥉":"🐾";

board.innerHTML+=`${medal} ${name} — ${pts}<br>`;

});

});

};



// SUBMIT ANSWER

window.submitAnswer=function(){

const text=document.getElementById("answerInput").value;

if(!text) return;

push(ref(db,"rooms/"+currentRoom+"/answers/"+currentName),{

text:text,
time:Date.now(),
checked:false,
scoreGiven:0

});

document.getElementById("answerInput").value="";

};



// GIF reward function

function showReward(points){

const gif=document.getElementById("rewardGif");
const box=document.getElementById("gifReward");

gif.src="gifs/point/"+points+".gif";

box.style.display="block";

setTimeout(()=>{

box.style.display="none";

},3000);

}

</script>

</body>
</html>
