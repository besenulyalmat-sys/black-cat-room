<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Black Cat Room — Teacher 5.0</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<header>👨‍🏫 Teacher Panel</header>

<input id="roomCode" placeholder="Room">

<textarea id="taskInput" placeholder="Write task"></textarea>

<button onclick="sendTask()">Send Task</button>

<button onclick="shutUp()">SHUT UP</button>

<div class="flex">

<div style="flex:1">

<h3>Student Answers</h3>

<div id="answers"></div>

</div>

<div class="sidebar">

<div class="leaderboard">

<h3>Leaderboard</h3>

<div id="leaderboard"></div>

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getDatabase,
ref,
onValue,
set
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig={

apiKey:"AIzaSy...",
authDomain:"black-cat-room.firebaseapp.com",
databaseURL:"https://black-cat-room-default-rtdb.europe-west1.firebasedatabase.app"

};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let room="";

window.sendTask=function(){

room=document.getElementById("roomCode").value;

const task=document.getElementById("taskInput").value;

set(ref(db,"rooms/"+room+"/task"),task);

listenAnswers();

}

function listenAnswers(){

onValue(ref(db,"rooms/"+room+"/answers"),snap=>{

const data=snap.val();

const container=document.getElementById("answers");

container.innerHTML="";

if(!data)return;

for(let student in data){

const attempts=data[student];

for(let id in attempts){

const a=attempts[id];

container.innerHTML+=`

<div class="card">

<b>${student}</b>

<p>${a.text}</p>

<button onclick="score('${student}',1)">+1</button>

<button onclick="score('${student}',-1)">-1</button>

<button onclick="comment('${student}')">Comment</button>

</div>

`;

}

}

});

}

window.score=function(student,val){

set(ref(db,"rooms/"+room+"/scores/"+student),val);

}

window.comment=function(student){

const text=prompt("Comment");

set(ref(db,"rooms/"+room+"/comments/"+student),text);

}

window.shutUp=function(){

set(ref(db,"rooms/"+room+"/meme"),"shutup");

}
document.getElementById("searchInput").addEventListener("input",function(){
 const value=this.value.toLowerCase();
 const cards=document.querySelectorAll(".answer-card");
 cards.forEach(card=>{
 const name=card.getAttribute("data-name");
 card.style.display=name.includes(value)?"block":"none";
 });
});
</script>

</body>
</html>





</script>

</body>
</html>
