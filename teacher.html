<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>👩‍🏫 Hi Pupils — Teacher</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<header>👩‍🏫 Hi Pupils — Teacher</header>

<input id="room" placeholder="Room code">

<textarea id="task" placeholder="Write task"></textarea>

<button onclick="sendTask()">Send Task</button>

<input id="search" placeholder="Search student">

<div class="counter">

New answers: <span id="counter">0</span>

</div>

<div class="layout">

<div class="answers">

<h3>Student Answers</h3>

<div id="answers"></div>

</div>

<div class="sidebar">

<div class="leaderboard">

<h3>Leaderboard</h3>

<div id="board"></div>

</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getDatabase,
ref,
onValue,
set,
get
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBsrZ_k2K8u0ybvkEDoEywD_QWzmDTKjyY",
  authDomain: "black-cat-room.firebaseapp.com",
  databaseURL: "https://black-cat-room-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "black-cat-room",
  storageBucket: "black-cat-room.firebasestorage.app",
  messagingSenderId: "80028312826",
  appId: "1:80028312826:web:ee918db88c71a0c1335543",
  measurementId: "G-9W8RSBP8WQ"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

let room="";
let seen=new Set();

window.sendTask=function(){

room=document.getElementById("room").value;

const task=document.getElementById("task").value;

set(ref(db,"rooms/"+room+"/task"),task);

listen();

}

function listen(){

onValue(ref(db,"rooms/"+room+"/answers"),snap=>{

const data=snap.val();

const container=document.getElementById("answers");

container.innerHTML="";

if(!data)return;

let counter=0;

for(let student in data){

for(let id in data[student]){

const a=data[student][id];

let cls="card";

if(!seen.has(id)){

cls+=" answer-new";
seen.add(id);
counter++;

}

container.innerHTML+=`

<div class="${cls}" data-name="${student}">

<b>${student}</b>

<p>${a.text}</p>

<button onclick="score('${student}',1)">+1</button>
<button onclick="score('${student}',-1)">-1</button>

<button onclick="shutup('${student}')">SHUT UP</button>

</div>

`;

}

}

document.getElementById("counter").innerText=counter;

});

onValue(ref(db,"rooms/"+room+"/scores"),snap=>{

const scores=snap.val();

if(!scores)return;

const sorted=Object.entries(scores)
.sort((a,b)=>b[1]-a[1])
.slice(0,10);

let html="";

sorted.forEach(([n,p])=>{

html+=n+" — "+p+"<br>";

});

document.getElementById("board").innerHTML=html;

});

}

window.score=async function(student,val){

const scoreRef=ref(db,"rooms/"+room+"/scores/"+student);

const snap=await get(scoreRef);

let current=snap.exists()?snap.val():0;

let newScore=current+val;

if(newScore<0)newScore=0;

set(scoreRef,newScore);

}

window.shutup=function(student){

set(ref(db,"rooms/"+room+"/shutup/"+student),true);

}

document.getElementById("search").addEventListener("input",function(){

const value=this.value.toLowerCase();

const cards=document.querySelectorAll(".card");

cards.forEach(card=>{

const name=card.getAttribute("data-name");

if(!name)return;

card.style.display=name.includes(value)?"block":"none";

});

});

</script>

</body>
</html>
