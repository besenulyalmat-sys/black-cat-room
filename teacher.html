<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Hi Pupils — Teacher</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<header>👩‍🏫 Hi Pupils — Teacher</header>

<input id="room" placeholder="Room code">

<textarea id="task" placeholder="Write task"></textarea>

<button onclick="sendTask()">Send Task</button>
<button onclick="clearRoom()" style="background:#ff4d6d;color:white;">
🧹 Clear Room
</button>
<button onclick="clearAnswers()">
🧹 Clear Answers Only
</button>
<h3>Lesson Timer</h3>

<input id="timerMinutes" placeholder="Minutes">
<button onclick="startTimer()">Start Timer</button>

<input id="search" placeholder="Search student">

<div class="layout">

<div class="answers">

<h3>Student Answers</h3>
<div id="answers"></div>

</div>

<div class="sidebar">

<div class="leaderboard">
<h3>Leaderboard</h3>
<div id="board"></div>
</div>

<div class="card">
<h3>Lesson Feedback</h3>
<div id="feedbackStats"></div>
</div>

</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
getDatabase,
ref,
onValue,
set,
get
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyBsrZ_k2K8u0ybvkEDoEywD_QWzmDTKjyY",
authDomain:"black-cat-room.firebaseapp.com",
databaseURL:"https://black-cat-room-default-rtdb.europe-west1.firebasedatabase.app",
projectId:"black-cat-room"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let room="";

window.sendTask=function(){

room=document.getElementById("room").value
const task=document.getElementById("task").value

set(ref(db,"rooms/"+room+"/task"),task)

function listen(){

// ===== ANSWERS =====
onValue(ref(db,"rooms/"+room+"/answers"),snap=>{

const data=snap.val()
const container=document.getElementById("answers")

container.innerHTML=""

if(!data) return

for(let student in data){

for(let id in data[student]){

const a=data[student][id]

container.innerHTML+=`

<div class="card" data-name="${student}">

<b>${student}</b>

<p>${a.text}</p>

<button onclick="score('${student}',1)">+1</button>
<button onclick="score('${student}',-1)">-1</button>

<button onclick="gifComment('${student}')">GIF</button>

<button onclick="shutup('${student}')">SHUT UP</button>

<textarea placeholder="Teacher comment"
onchange="comment('${student}',this.value)">
</textarea>

</div>

`

}

}

})

// ===== LEADERBOARD =====
onValue(ref(db,"rooms/"+room+"/scores"),snap=>{

const scores=snap.val()

if(!scores){
document.getElementById("board").innerHTML="No data"
return
}

const sorted=Object.entries(scores)
.sort((a,b)=>b[1]-a[1])
.slice(0,10)

let html=""

sorted.forEach(([n,p])=>{
html+=n+" — "+p+"<br>"
})

document.getElementById("board").innerHTML=html

})

// ===== FEEDBACK (ИСПРАВЛЕН) =====
onValue(ref(db,"rooms/"+room+"/feedback"),snap=>{

const data=snap.val()

let good=0
let middle=0
let bad=0

if(data){
for(let s in data){

if(data[s]=="good") good++
if(data[s]=="middle") middle++
if(data[s]=="bad") bad++

}
}

document.getElementById("feedbackStats").innerHTML=`
<div style="font-size:18px;line-height:1.8">
👍 Understand: ${good}<br>
😐 Middle: ${middle}<br>
👎 Don't understand: ${bad}
</div>
`

})

}

window.score=async function(student,val){

const scoreRef=ref(db,"rooms/"+room+"/scores/"+student)

const snap=await get(scoreRef)

let current=snap.exists()?snap.val():0

let newScore=current+val

if(newScore<0)newScore=0

set(scoreRef,newScore)

}

window.comment=function(student,text){

set(ref(db,"rooms/"+room+"/comments/"+student),text)

}

window.gifComment=function(student){

const gifs=[
"comment.gif",
"comment1.gif"
]

const random=Math.floor(Math.random()*gifs.length)

set(ref(db,"rooms/"+room+"/gifcomment/"+student),gifs[random])

}

window.shutup=function(student){

set(ref(db,"rooms/"+room+"/shutup/"+student),Date.now())

}

document.getElementById("search").addEventListener("input",function(){

const value=this.value.toLowerCase()

const cards=document.querySelectorAll(".card")

cards.forEach(card=>{

const name=card.getAttribute("data-name")

card.style.display=name.includes(value)?"block":"none"

})

})

</script>

</body>
</html>
